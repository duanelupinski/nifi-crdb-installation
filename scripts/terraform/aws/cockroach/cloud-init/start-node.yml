#cloud-config
repo_update: true
package_upgrade: true
timezone: UTC

write_files:
  - path: /usr/bin/check-packages.sh
    permissions: '0755'
    content: |
      #!/bin/bash
      
      packages=$1
      export IFS=","
      
      for package in $${packages}; do
          name=$(echo $${package} | sed -e 's/^[[:space:]]*//')
          count=$(dpkg-query -l "$${name}" | grep "$${name}" | wc -l)
          attempts=0
          while [[ $${count} -eq 0 && $${attempts} -lt 12 ]]; do
              ((attempts++))
              sleep 15
              sudo apg-get install -y $(echo "$${packages}" | tr ',' ' ')
              count=$(dpkg-query -l "$${name}" | grep "$${name}" | wc -l)
          done
      done
  
  - path: /var/lib/cockroach/mount-cockroach.sh
    permissions: '0755'
    content: |
      #!/bin/bash
      
      count=0
      attempts=0
      while [[ $${count} -eq 0 && $${attempts} -lt 24 ]]; do
          ((attempts++))
          device_name=/dev/sdp
          count=$(ls -ltrh $${device_name} | wc -l)
          if [[ $${count} -eq 0 ]] ; then
              device_name=/dev/xvdp
              count=$(ls -ltrh $${device_name} | wc -l)
              if [[ $${count} -eq 0 ]] ; then
                  device_name=/dev/hdp
                  count=$(ls -ltrh $${device_name} | wc -l)
                  if [[ $${count} -eq 0 ]] ; then
                      sleep 15
                  fi
              fi
          fi
      done
      
      sudo mkfs -t xfs $${device_name}
      sudo mkdir -p /mnt/cockroach-data
      sudo mount $${device_name} //mnt/cockroach-data
      sudo chown -R cockroach:cockroach /mnt/cockroach-data
      echo $${device_name}    /mnt/cockroach-data    xfs    defaults    0    2 | sudo tee -a /etc/fstab > /dev/null
  
  - path: /etc/systemd/system/node_exporter.service
    content: |
      [Unit]
      Description=Node Exporter
      After=network.target

      [Service]
      Type=simple
      ExecStart=/usr/local/bin/node_exporter
      Restart=on-failure
      User=node_exporter
      Group=node_exporter

      [Install]
      WantedBy=multi-user.target

apt:
  sources_list: |
    deb http://deb.debian.org/debian/ $(lsb_release -a | grep Codename: | cut -f2 -d: | xargs) main contrib non-free
    deb-src http://deb.debian.org/debian/ $(lsb_release -a | grep Codename: | cut -f2 -d: | xargs) main contrib non-free

    deb http://deb.debian.org/debian/ $(lsb_release -a | grep Codename: | cut -f2 -d: | xargs)-updates main contrib non-free
    deb-src http://deb.debian.org/debian/ $(lsb_release -a | grep Codename: | cut -f2 -d: | xargs)-updates main contrib non-free

    deb http://deb.debian.org/debian-security $(lsb_release -a | grep Codename: | cut -f2 -d: | xargs)-security main
    deb-src http://deb.debian.org/debian-security $(lsb_release -a | grep Codename: | cut -f2 -d: | xargs)-security main
  conf: |
    APT {
      Get {
        Assume-Yes "true";
        Fix-Broken "true";
      };
    };

packages:
  - apt-transport-https
  - bc
  - build-essential
  - ca-certificates
  - curl
  - debconf-utils
  - dnsutils
  - gnupg2
  - less
  - net-tools
  - numactl
  - rsync
  - screen
  - software-properties-common
  - vim
  - wget
  - xfsprogs

runcmd:
  # the cdn for our debian distro will throttle requests and depending on the number of instances
  # we are spinning up concurrently we need to confirm that the packages are successfully installed
  - /usr/bin/check-packages.sh 'apt-transport-https,bc,build-essential,ca-certificates,curl,debconf-utils,dnsutils,gnupg2,less,net-tools,rsync,screen,software-properties-common,vim,wget,xfsprogs'
  
  ## synchronize the clocks
  - sudo apt install systemd-timesyncd
  - sudo systemctl unmask systemd-timesyncd.service
  - sudo timedatectl set-ntp no
  - sudo apt-get install -y ntp
  - sudo service ntp stop
  - sudo ntpd -b time.google.com
  - sudo sed -i 's/^pool/#pool/' /etc/ntp.conf
  - sudo sed -i 's/^server/#server/' /etc/ntp.conf
  - echo 'server time1.google.com iburst' | sudo tee -a /etc/ntp.conf
  - echo 'server time2.google.com iburst' | sudo tee -a /etc/ntp.conf
  - echo 'server time3.google.com iburst' | sudo tee -a /etc/ntp.conf
  - echo 'server time4.google.com iburst' | sudo tee -a /etc/ntp.conf
  - sudo service ntp start
  
  ## install the cockroach binaries
  - curl https://binaries.cockroachdb.com/cockroach-v23.1.11.linux-${architecture}.tgz | tar -xz
  - sudo cp -i cockroach-v23.1.11.linux-${architecture}/cockroach /usr/local/bin/
  - sudo mkdir -p /usr/local/lib/cockroach
  - sudo cp -i cockroach-v23.1.11.linux-${architecture}/lib/libgeos.so /usr/local/lib/cockroach/
  - sudo cp -i cockroach-v23.1.11.linux-${architecture}/lib/libgeos_c.so /usr/local/lib/cockroach/
  - sudo mkdir /var/lib/cockroach
  - chown cockroach /var/lib/cockroach
  
  ## format and mount the filesystem for the cockroach database
  - /var/lib/cockroach/mount-cockroach.sh
  
  ## install, configure and start node exporter
  - wget https://github.com/prometheus/node_exporter/releases/download/v1.6.0/node_exporter-1.6.0.linux-${architecture}.tar.gz
  - tar xvfz node_exporter-1.6.0.linux-${architecture}.tar.gz
  - rm node_exporter-1.6.0.linux-${architecture}.tar.gz
  - sudo mv node_exporter-1.6.0.linux-${architecture}/node_exporter /usr/local/bin/
  - rm -fr node_exporter-1.6.0.linux-${architecture}
  - sudo useradd -rs /bin/false node_exporter
  - sudo mkdir -p /etc/prometheus_node_exporter/
  - sudo touch /etc/prometheus_node_exporter/configuration.yml
  - sudo chmod 600 /etc/prometheus_node_exporter/*
  - sudo chmod 700 /etc/prometheus_node_exporter
  - sudo chown -R node_exporter:node_exporter /etc/prometheus_node_exporter
  - sudo systemctl daemon-reload
  - sudo systemctl enable node_exporter
  - sudo systemctl start node_exporter
  
  ## configure aws credentials
  - aws configure set aws_access_key_id "${aws_key}"
  - aws configure set aws_secret_access_key "${aws_secret}"
  - aws configure set region "${aws_region}"
  - aws configure set output_format "json"

users:
- default
- name: ${vm_user}
  gecos: Debian User
  sudo: ALL=(ALL) NOPASSWD:ALL
  shell: /bin/bash
  lock_passwd: true
  ssh_authorized_keys:
  - ${ssh_key}
- name: cockroach
  gecos: Cockroach User
  shell: /bin/bash
  lock_passwd: true
- name: root
  lock_passwd: true

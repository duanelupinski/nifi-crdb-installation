#cloud-config
package_update: true
package_upgrade: false

packages:
  - ca-certificates
  - gnupg
  - curl

runcmd:
  - bash -lc 'set -euxo pipefail'

  # MongoDB 7.0 repo for Ubuntu 22.04 "jammy"
  - bash -lc 'curl -fsSL https://pgp.mongodb.com/server-7.0.asc | gpg --dearmor -o /usr/share/keyrings/mongodb-server-7.0.gpg'
  - bash -lc 'echo "deb [ signed-by=/usr/share/keyrings/mongodb-server-7.0.gpg ] https://repo.mongodb.org/apt/ubuntu jammy/mongodb-org/7.0 multiverse" > /etc/apt/sources.list.d/mongodb-org-7.0.list'

  # Install MongoDB + mongosh
  - bash -lc 'apt-get update'
  - bash -lc 'DEBIAN_FRONTEND=noninteractive apt-get install -y mongodb-org mongodb-mongosh'

  # Ensure dirs/owners
  - bash -lc 'install -d -o mongodb -g mongodb -m 0755 /var/lib/mongodb /var/log/mongodb'

  # Write mongod.conf (no deprecated storage.journal.*)
  - |-
    bash -lc 'cat >/etc/mongod.conf << "EOF"
    systemLog:
      destination: file
      path: /var/log/mongodb/mongod.log
      logAppend: true
    storage:
      dbPath: /var/lib/mongodb
    net:
      bindIpAll: true
      port: 27017
    replication:
      replSetName: rs0
    EOF'

  # Start + enable
  - bash -lc 'systemctl daemon-reload && systemctl enable --now mongod'

  # Wait for socket up to 30s
  - |-
    bash -lc '
      for i in $(seq 1 30); do
        ss -lnt | grep -q ":27017 " && break
        sleep 1
      done
    '

  # Idempotent RS init using VM IP (not 127.0.0.1)
  - |-
    bash -lc '
      IP=$(hostname -I | awk "{print \$1}")
      OK=$(mongosh --quiet --eval "try { rs.status().ok } catch(e) { 0 }")
      if [ "$OK" != "1" ]; then
        mongosh --quiet --eval "rs.initiate({_id:\"rs0\", members:[{_id:0, host:\"$IP:27017\"}]})"
      else
        CUR=$(mongosh --quiet --eval "cfg=rs.conf(); print(cfg.members[0].host)")
        [ "$CUR" = "$IP:27017" ] || mongosh --quiet --eval "cfg=rs.conf(); cfg.members[0].host=\"$IP:27017\"; rs.reconfig(cfg,{force:true})"
      fi
    '

  # Allow 27017 if ufw is present
  - bash -lc 'command -v ufw >/dev/null 2>&1 && ufw allow 27017 || true'
